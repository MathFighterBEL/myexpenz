<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <script>
    // GitHub Pages SPA redirect:
    // Redirects /privacypolicy or /termsofuse to /?p=/privacypolicy etc.
    // index.html then picks up the ?p= param and opens the correct modal.
    var path = window.location.pathname;
    window.location.replace('/?p=' + encodeURIComponent(path));
  </script>
</head>
<body></body>
</html>
